services:
  # Servicio del Backend (Django)
  backend:
    build:
      context: ./backend 
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app 
    environment:
      - DEBUG=1

  # Servicio del Frontend (React + Nginx)
  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend


volumes:
  postgres_data: