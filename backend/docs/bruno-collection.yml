opencollection: 1.0.0
info:
  name: Invera TodoList
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ''
      port: ''
      auth:
        username: ''
        password: ''
      bypassProxy: ''
  environments:
    - name: todo-api
      variables:
        - name: base_url
          value: http://127.0.0.1:8000
        - name: token
          value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzczMjQwMzY2LCJpYXQiOjE3NzMyMzY3NjYsImp0aSI6ImYxMWVkYzVjNDAzZTQwZmQ5MDlmNjdmNjVmMTc3YWM2IiwidXNlcl9pZCI6IjEifQ.zcKy6KShAgrK5otUyYT5dZW4dGMd1hklG6q0VDkY8aw
items:
  - info:
      name: Login
      type: http
      seq: 1
    http:
      method: POST
      url: '{{base_url}}/api/auth/login/'
      body:
        type: json
        data: |-
          {
            "username":"demouser",
            "password":"demopass"
          }
      auth: inherit
    runtime:
      scripts:
        - type: after-response
          code: |-
            const data = res.getBody();

            bru.setEnvVar("token", data.access);
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: List ToDo
      type: http
      seq: 2
    http:
      method: GET
      url: '{{base_url}}/api/todos/get/'
      headers:
        - name: Authorization
          value: Bearer {{token}}
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Create ToDo
      type: http
      seq: 3
    http:
      method: POST
      url: '{{base_url}}/api/todos/create/'
      headers:
        - name: Authorization
          value: Bearer {{token}}
      body:
        type: json
        data: |-
          {
            "title":"Dormir bebe",
            "completed": false
          }
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Complete ToDo
      type: http
      seq: 4
    http:
      method: PATCH
      url: '{{base_url}}/api/todos/complete/6/'
      headers:
        - name: Authorization
          value: Bearer {{token}}
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Delete ToDo
      type: http
      seq: 5
    http:
      method: DELETE
      url: '{{base_url}}/api/todos/delete/7/'
      headers:
        - name: Authorization
          value: Bearer {{token}}
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
  - info:
      name: Register User
      type: http
      seq: 6
    http:
      method: POST
      url: '{{base_url}}/api/users/register/'
      body:
        type: json
        data: |-
          {
            "username":"demouser2",
            "password":"demopass"
          }
      auth: inherit
    settings:
      encodeUrl: true
      timeout: 0
      followRedirects: true
      maxRedirects: 5
bundled: true
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
    exportedAt: '2026-03-11T18:59:08.520Z'
    exportedUsing: Bruno
